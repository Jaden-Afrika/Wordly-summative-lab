<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 
 <header class="navbar">
  <img src="WORDLY2.jpg" alt="Logo" width="200">
  
 </header>
 
 <main>
  <section class="search-section">
    <form id="search-form" class="search-form">
      <label for="search-input" class="visually-hidden">Search word</label>
      <input type="search" id="search-input" name="word" placeholder="Search for a word..." autocomplete="off">
      <button type="submit">Search</button>
    </form>
  </section>

  <section id="search-results" class="search-results">
    <h2>Search results</h2>
    <div class="result-card">
      <div class="definition-block">
        <h3>Definition</h3>
        <p class="definition-placeholder">Definition will appear here after you search.</p>
      </div>
      <div class="example-block">
        <h3>Example</h3>
        <p class="example-placeholder">Example sentence will appear here.</p>
      </div>
      <div class="synonyms-block">
        <h3>Synonyms</h3>
        <p class="synonyms-placeholder">Synonyms will appear here.</p>
      </div>
      <div class="audio-block">
        <h3>Pronunciation</h3>
        <div class="audio-placeholder">Audio playback controls will appear here.</div>
      </div>
    </div>
  </section>

  <section class="hero-section">
    <div class="R1M">
      <img src="Library.jpg" alt="Books" class="full-width-image">
      <div class="R1M2">
        <p1>WORDLY LIBRARY</p1>
        <h2>INCREASING LINGUISTIC ABILITIES</h2>
        <a href="https://youtu.be/MMmOLN5zBLY?si=tia2SNe3od4nzQlR"> VIEW THE IMPORTANCE OF BILINGUALISM </a>
      </div>
    </div>
  </section>
 </main>
 <script src="index.js"></script>
</body>
</html>
